<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天空之眼全景查看器</title>
  
  <!-- 使用 Pannellum 作为全景查看器替代方案 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>
  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    #panorama {
      width: 100vw;
      height: 100vh;
      background-color: #000;
    }
    
    /* 隐藏原始的加载信息和 by 文字 */
    .pnlm-load-box,
    .pnlm-title,
    .pnlm-author {
      display: none !important;
    }
    
    /* 自定义加载提示样式 */
    #loading-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
    }
    
    #loading-text {
      margin-bottom: 20px;
      font-size: 18px;
      letter-spacing: 1px;
    }
    
    /* 动画效果容器 */
    .loading-animation {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 50px;
    }
    
    /* 动画效果样式 - 类似 Loading 2 */
    .line {
      display: inline-block;
      width: 15px;
      height: 15px;
      margin: 0 5px;
      border-radius: 15px;
      background-color: #4b9cdb;
      animation: loadingB 1.5s ease-in-out infinite;
    }
    
    .line:nth-child(1) {
      animation-delay: 0s;
    }
    
    .line:nth-child(2) {
      animation-delay: 0.25s;
    }
    
    .line:nth-child(3) {
      animation-delay: 0.5s;
    }
    
    @keyframes loadingB {
      0% {
        width: 15px;
      }
      50% {
        width: 35px;
      }
      100% {
        width: 15px;
      }
    }
    
    /* 自定义控制按钮位置 */
    .pnlm-controls-container {
      bottom: 10px !important;
      left: 10px !important;
      right: auto !important;
      top: auto !important;
    }
    
    .back-button {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 100; /* 提高z-index确保在Pannellum控件之上 */
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 8px 12px;
      background-color: rgba(0, 0, 0, 0.6);
      color: white;
      border-radius: 4px;
      text-decoration: none;
      transition: background-color 0.3s ease;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
      font-size: 14px;
    }
    
    .back-button:hover {
      background-color: rgba(0, 0, 0, 0.8);
    }
    
    .back-button svg {
      width: 16px;
      height: 16px;
    }
    
    .error-message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px;
      text-align: center;
      color: #721c24;
      background-color: #f8d7da;
      border: 1px solid #f5c6cb;
      border-radius: 4px;
      z-index: 1;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
    }
    
    .error-message a {
      color: #0066cc;
      margin-top: 10px;
      display: inline-block;
    }

    /* 顶部标题栏 —— 右上角，胶囊样式 */
    .panorama-title {
      position: fixed;
      top: 22px;
      right: 22px;
      z-index: 100;
      max-width: 320px;
      padding: 9px 18px;
      background-color: rgba(20, 20, 22, 0.42);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      backdrop-filter: blur(12px) saturate(150%);
      -webkit-backdrop-filter: blur(12px) saturate(150%);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.25);
    }

    /* 底部描述栏 —— 右下角面板 */
    .panorama-desc {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 100;
      width: 380px;
      max-width: calc(100vw - 44px);
      padding: 16px 40px 14px 18px;
      background-color: rgba(20, 20, 22, 0.42);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      font-size: 13.5px;
      line-height: 1.7;
      letter-spacing: 0.02em;
      backdrop-filter: blur(12px) saturate(150%);
      -webkit-backdrop-filter: blur(12px) saturate(150%);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.3);
      box-sizing: border-box;
    }

    .panorama-desc.hidden {
      display: none;
    }

    .panorama-desc-text {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
      white-space: normal;
    }

    .panorama-desc.expanded .panorama-desc-text {
      -webkit-line-clamp: unset;
      overflow: visible;
    }

    .panorama-desc-toggle {
      margin-top: 6px;
      color: #7ec1ff;
      cursor: pointer;
      font-size: 13px;
      user-select: none;
      display: none;
    }

    .panorama-desc.clamped .panorama-desc-toggle,
    .panorama-desc.expanded .panorama-desc-toggle {
      display: inline-block;
    }

    .panorama-desc-close {
      position: absolute;
      top: 8px;
      right: 10px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      opacity: 0.7;
      font-size: 18px;
      line-height: 1;
      border-radius: 4px;
      transition: opacity 0.2s, background-color 0.2s;
    }

    .panorama-desc-close:hover {
      opacity: 1;
      background-color: rgba(255, 255, 255, 0.1);
    }

    /* 移动端隐藏标题和描述 */
    @media (max-width: 768px) {
      .panorama-title,
      .panorama-desc {
        display: none !important;
      }
    }
  </style>
</head>
<body>
  <!-- 返回按钮 -->
  <a id="back-button" href="/" class="back-button">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5"></path>
      <path d="M12 19l-7-7 7-7"></path>
    </svg>
    <span>返回详情页</span>
  </a>
  
  <!-- 顶部标题 -->
  <div id="panorama-title" class="panorama-title" style="display: none;"></div>

  <!-- 全景照片查看器容器 -->
  <div id="panorama"></div>

  <!-- 底部描述 -->
  <div id="panorama-desc" class="panorama-desc hidden">
    <div id="panorama-desc-close" class="panorama-desc-close" title="关闭描述">×</div>
    <div id="panorama-desc-text" class="panorama-desc-text"></div>
    <span id="panorama-desc-toggle" class="panorama-desc-toggle">展开全部</span>
  </div>
  
  <!-- 错误信息容器 -->
  <div id="error-container" style="display: none;" class="error-message"></div>
  
  <!-- 自定义加载提示 -->
  <div id="loading-container">
    <div id="loading-text">图片加载中...</div>
    <div class="loading-animation">
      <div class="line"></div>
      <div class="line"></div>
      <div class="line"></div>
    </div>
  </div>
  
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // 显示错误信息
      function showError(message) {
        const errorContainer = document.getElementById('error-container');
        errorContainer.innerHTML = `
          <p>${message}</p>
          <a href="/sky-eye/">返回天空之眼首页</a>
        `;
        errorContainer.style.display = 'block';
        document.getElementById('panorama').style.display = 'none';
      }
      
      // 从 URL 查询参数中获取全景照片路径和标题
      const urlParams = new URLSearchParams(window.location.search);
      const panoramaPath = urlParams.get('panorama');
      const pageTitle = urlParams.get('title') || '全景照片';
      const returnUrl = urlParams.get('return') || '/sky-eye/';
      const pageDesc = urlParams.get('desc') || '';
      
      // 设置返回按钮
      const decodedReturnUrl = decodeURIComponent(returnUrl);
      document.getElementById('back-button').href = decodedReturnUrl;

      // 设置顶部标题
      const decodedTitle = decodeURIComponent(pageTitle);
      const titleEl = document.getElementById('panorama-title');
      if (decodedTitle && decodedTitle !== '全景照片') {
        titleEl.textContent = decodedTitle;
        titleEl.style.display = 'block';
      }

      // 拉取并展示底部描述
      (function setupDescription() {
        const descBox = document.getElementById('panorama-desc');
        const descText = document.getElementById('panorama-desc-text');
        const toggleBtn = document.getElementById('panorama-desc-toggle');
        const closeBtn = document.getElementById('panorama-desc-close');

        closeBtn.addEventListener('click', function() {
          descBox.classList.add('hidden');
        });

        toggleBtn.addEventListener('click', function() {
          if (descBox.classList.contains('expanded')) {
            descBox.classList.remove('expanded');
            toggleBtn.textContent = '展开全部';
          } else {
            descBox.classList.add('expanded');
            toggleBtn.textContent = '收起';
          }
        });

        const decodedDesc = pageDesc ? decodeURIComponent(pageDesc) : '';
        if (decodedDesc) {
          descText.textContent = decodedDesc;
          descBox.classList.remove('hidden');
          requestAnimationFrame(function() {
            if (descText.scrollHeight - descText.clientHeight > 1) {
              descBox.classList.add('clamped');
            }
          });
        }
      })();
      
      if (!panoramaPath) {
        showError('未指定全景照片路径');
        return;
      }
      
      // 构建完整的全景照片 URL
      let panoramaUrl = decodeURIComponent(panoramaPath);
      if (panoramaUrl.startsWith('/')) {
        panoramaUrl = window.location.origin + panoramaUrl;
      }
      
      console.log('全景照片完整路径:', panoramaUrl);
      
      // 检测设备类型
      function isMobileDevice() {
        return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
               (window.innerWidth <= 768);
      }
      
      // 根据设备类型设置不同的视场角
      const defaultHfov = isMobileDevice() ? 60 : 100;
      console.log('设备类型:', isMobileDevice() ? '移动设备' : 'PC设备', '视场角:', defaultHfov);
      
      // 创建图片预加载并显示动画
      const img = new Image();
      let loadingContainer = document.getElementById('loading-container');
      
      // 图片加载完成后隐藏加载提示
      img.onload = function() {
        // 给用户一个短暂的动画完成时间，然后隐藏加载提示
        setTimeout(function() {
          loadingContainer.style.display = 'none';
        }, 500);
        
        initPannellum();
      };
      
      // 图片加载失败处理
      img.onerror = function() {
        showError('全景图片加载失败，请检查图片路径是否正确');
        loadingContainer.style.display = 'none';
      };
      
      // 开始加载图片
      img.src = panoramaUrl;
      
      // 使用 Pannellum 创建全景查看器
      function initPannellum() {
        try {
          pannellum.viewer('panorama', {
          type: 'equirectangular',
          panorama: panoramaUrl,
          autoLoad: true,
          title: decodeURIComponent(pageTitle),
          showFullscreenCtrl: true,
          showZoomCtrl: true,
          keyboardZoom: true,
          mouseZoom: true,
          draggable: true,
          disableKeyboardCtrl: false,
          showControls: true,
          hfov: defaultHfov, // 使用根据设备类型确定的视场角
          compass: false,
          northOffset: 0,
          preview: '',
          previewTitle: '',
          previewAuthor: '',
          horizonPitch: 0,
          horizonRoll: 0,
          minHfov: 30,
          maxHfov: 120,
          escapeHTML: true,
          crossOrigin: 'anonymous',
          hotSpotDebug: false,
          autoRotate: 0,
          author: '',
          // 自定义字符串，去除 by 文字
          strings: {
            loadButtonLabel: '点击加载全景',
            loadingLabel: '加载中...',
            bylineLabel: '%s'  // 将 "by %s" 改为只显示作者名，不显示 "by"
          }
        });
      } catch (error) {
        console.error('创建查看器失败:', error);
        showError(`创建查看器失败：${error.message}`);
        loadingContainer.style.display = 'none';
      }
      }
    });
  </script>
</body>
</html>
